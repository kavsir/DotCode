name: Docker Build Test

on:
  push:
    paths-ignore:
      - 'aider/website/**'
      - 'README.md'
      - 'HISTORY.md'
      - '.github/workflows/*'
      - '!.github/workflows/docker-build-test.yml'
    branches:
      - main
  pull_request:
    paths-ignore:
      - 'aider/website/**'
      - 'README.md'
      - 'HISTORY.md'
      - '.github/workflows/*'
      - '!.github/workflows/docker-build-test.yml'
    branches:
      - main

jobs:
  docker_build_and_push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # ❌ BỎ KHỐI NÀY ĐI - không cần login nếu chỉ build test
    # - name: Login to DockerHub
    #   if: ${{ github.event_name != 'pull_request' }}
    #   uses: docker/login-action@v3
    #   with:
    #     username: ${{ secrets.DOCKERHUB_USERNAME }}
    #     password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Build Docker images (PR)
      if: ${{ github.event_name == 'pull_request' }}
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: false
        target: aider

    - name: Build Docker images (Push) - Test only
      if: ${{ github.event_name != 'pull_request' }}
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: false  # ✅ THAY 'true' THÀNH 'false' - chỉ test build
        # tags: ${{ secrets.DOCKERHUB_USERNAME }}/aider:dev  # ❌ Bỏ đi
        target: aider

    - name: Build Docker full image (PR)
      if: ${{ github.event_name == 'pull_request' }}
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: false
        target: aider-full

    - name: Build Docker full image (Push) - Test only
      if: ${{ github.event_name != 'pull_request' }}
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: false  # ✅ THAY 'true' THÀNH 'false' - chỉ test build
        # tags: ${{ secrets.DOCKERHUB_USERNAME }}/aider-full:dev  # ❌ Bỏ đi
        target: aider-full