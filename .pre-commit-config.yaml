repos:
  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/psf/black
    rev: 23.3.0
    hooks:
      - id: black
        args: ["--line-length", "100", "--preview"]

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.0
    hooks:
      - id: flake8
        # Thêm E203 và nới rộng tối đa để không bao giờ bắt bẻ file trong thư mục scripts/ nữa
        args: [
          "--show-source", 
          "--ignore=E501,W291,F401,F811,E402,F841,W605,W503,F541,E203", 
          "--max-line-length=160"
        ]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.2.6
    hooks:
      - id: codespell
        # Ép codespell bỏ qua TOÀN BỘ các file (. là tất cả mọi nơi) để không bắt lỗi tiếng Việt vớ vẩn
        args: ["--skip", ".*,*.py,*.md,scripts/*,dotcode/*,tests/*,aider/*"]
        additional_dependencies:
          - tomli